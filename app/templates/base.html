<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Мой Flask Сайт{% endblock %}</title>
    <!-- Подключаем ваши стили, если они лежат в static/style.css -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Навигационная панель (Шапка сайта) -->
    <nav class="navbar" style="background: #f4f4f4; padding: 15px; display: flex; justify-content: space-between;">
        <div class="logo">
            <a href="{{ url_for('main.home') }}" style="font-weight: bold; text-decoration: none; color: #333;">MyFlaskAPP</a>
        </div>
        <div class="nav-links">
            <a href="{{ url_for('main.home') }}" style="margin-right: 15px;">Главная</a>
            
            <!-- Условие Flask-Login: если пользователь вошел на сайт -->
            {% if current_user.is_authenticated %}
                <span style="margin-right: 15px; color: green;">Привет, <strong>{{ current_user.username }}</strong>!</span>
                <a href="{{ url_for('auth.logout') }}" style="color: red;">Выйти</a>
            {% else %}
                <!-- Если зашел гость -->
                <a href="{{ url_for('auth.login') }}" style="margin-right: 15px;">Войти</a>
                <a href="{{ url_for('auth.register') }}">Регистрация</a>
            {% endif %}
        </div>
    </nav>
    
    <!-- Основной контент страницы -->
    <main class="content-wrapper" style="max-width: 800px; margin: 0 auto; padding: 15px;">
        {% block content %}
        <!-- Здесь будет отображаться контент дочерних страниц -->
        {% endblock %}
    </main>

    <!-- Скрипт для скрытия алертов при клике (на случай, если он нужен на всех страницах) -->
    
</body>
</html>
